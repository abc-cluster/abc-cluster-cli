name: Build abc-cluster-cli

on:
  push:
    tags:
      - abc-cli-v*

permissions:
  contents: read

jobs:
  verify-tag-on-main:
    name: Verify Tag Commit On Main
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tagged commit is on main
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main --depth=1
          if git branch -r --contains "${GITHUB_SHA}" | grep -q "origin/main"; then
            echo "Tag ${GITHUB_REF_NAME} points to a commit on main."
          else
            echo "Tag ${GITHUB_REF_NAME} does not point to a commit on main." >&2
            exit 1
          fi

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: verify-tag-on-main
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          set -euo pipefail
          mkdir -p dist
          BIN_NAME="abc-cluster-cli"
          EXT=""
          if [ "${GOOS}" = "windows" ]; then
            EXT=".exe"
          fi
          OUT="dist/${BIN_NAME}-${GOOS}-${GOARCH}${EXT}"
          go build -trimpath -ldflags="-s -w" -o "${OUT}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: abc-cluster-cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/*
