name: Build abc-cluster-cli

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - v*.*.*

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          cache: true

      - name: Build binary
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          CLI_VERSION: ${{ github.ref_name }}
          CLI_COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p dist
          BIN_NAME="abc"
          EXT=""
          if [ "${GOOS}" = "windows" ]; then
            EXT=".exe"
          fi
          OUT="dist/${BIN_NAME}-${GOOS}-${GOARCH}${EXT}"
          go build -trimpath -ldflags="-s -w -X 'github.com/abc-cluster/abc-cluster-cli/cmd.version=${CLI_VERSION}' -X 'github.com/abc-cluster/abc-cluster-cli/cmd.commit=${CLI_COMMIT}'" -o "${OUT}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: abc-cluster-cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/*
