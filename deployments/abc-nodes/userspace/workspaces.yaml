        ntfyTopic: su-mbhg-tbgenomics-jobs
        members:
          - name: admin
            role: group-admin
          - name: hanno
            role: member
            email: hanno@su-mbhg.example.edu
        # No submitAccount: tbgenomics does not use nf-nomad automated submission

