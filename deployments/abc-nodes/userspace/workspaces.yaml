version: v1

# ---------------------------------------------------------------------------
# abc-nodes workspace specification
#
# This file is the single source of truth for workspace lifecycle management.
# Running `pulumi up` applies any diff against live Nomad + MinIO state.
#
# Naming conventions:
#   Nomad namespace:  <org>-<workspace>          e.g. su-mbhg-bioinformatics
#   MinIO bucket:     <org>-<workspace>          (same as namespace)
#
# Roles & principals (one Nomad token + one MinIO user per principal):
#   role: group-member       → <namespace>_<name>           (default)
#   role: group-admin        → <namespace>_<name>-admin
#   role: group-collaborator → <namespace>_collab-<name>
#   submitAccount            → <namespace>_submit
#
# A member may declare multiple roles (e.g. role: [group-member, group-admin]).
# They get ONE token + ONE MinIO user PER role. The default token is the
# group-member one; `abc --sudo` selects the group-admin token via abc-jurist.
#
#   Nomad ACL token name: same as MinIO user; SecretID = MinIO password
#   Nomad policy:         <namespace>-{group-admin|member|submit}
#   MinIO IAM policy:     ns-<namespace>-group-admin  |  ns-<namespace>-user-<name>
#
# Bucket layout per workspace:
#   <bucket>/users/<member>/            — member private workspace  (member r/w)
#   <bucket>/collab/<name>/             — collaborator area         (collab r/w)
#   <bucket>/shared/                    — read-only for all (references, datasets)
#   <bucket>/shared/users/<member>/     — member's shared contribution  (member r/w)
#   <bucket>/samplesheets/              — input samplesheets  (members + submit read)
#   <bucket>/pipelines/                 — pipeline outputs  (submit write; members read)
#
# Credential variables (Nomad, abc-services namespace):
#   nomad/jobs/abc-nodes-minio-iam/<principal>
#   Fields: access_key, secret_key, role, scope, bucket
#
# States:
#   active     — fully operational (default)
#   suspended  — ACL tokens revoked; data preserved
#   archived   — bucket versioning suspended; read-only intent
#   deleted    — tombstone only; remove entry after `pulumi destroy` confirms
#
# Priority tiers:
#   high   → job_priority=70  (preempts normal-priority batch jobs)
#   normal → job_priority=50  (default; can be preempted by high-priority groups)
#
# To add a workspace:    add an entry here, run `pulumi up`.
# To add a member:       add an entry under members:, run `pulumi up`.
# To add a collaborator: add an entry under collaborators: with expiresAt, run `pulumi up`.
# To remove a workspace: delete the entry (or set state: deleted), run `pulumi up`.
# To remove a member:    delete the entry, run `pulumi up` (token + MinIO user destroyed).
# To suspend:            set state: suspended, run `pulumi up` (tokens revoked, data preserved).
#
# Destroying a stack:
#   `pulumi destroy` is gated on the project config flag `allowDestroy`.
#   Without it, IAM users and buckets refuse to delete while non-empty,
#   protecting against accidental data loss. To wipe a stack end-to-end:
#     pulumi config set allowDestroy true
#     pulumi up        # propagates forceDestroy=true onto live resources
#     pulumi destroy
#   This deletes all Nomad ACL tokens/policies/namespaces, MinIO IAM users +
#   policies, and S3 buckets including every object version + delete marker.
#
# Note: all workspaces share one Pulumi stack. `pulumi up` re-evaluates the
# entire spec but only applies diffs — unchanged resources are not touched.
# If you want blast-radius isolation (e.g. a bad new workspace can't stall
# updates for others), use one stack per workspace with `pulumi stack init <ns>`
# and `pulumi config set specFile workspaces/<ns>.yaml`.
# ---------------------------------------------------------------------------

organizations:

  # =========================================================================
  # SU-MBHG — Molecular Biology and Human Genetics
  # =========================================================================
  - name: su-mbhg
    displayName: "SU-MBHG — Molecular Biology and Human Genetics"
    workspaces:

      - name: bioinformatics
        description: "SU-MBHG Bioinformatics — pipelines and ad-hoc batch jobs (high priority)"
        state: active
        priority: high        # job_priority=70; preempts normal-priority groups
        contact: bioinformatics-pi@sun.ac.za
        ntfyTopic: su-mbhg-bioinformatics-jobs
        members:
          # group-admin: full namespace write; creates <ns>_admin MinIO user
          - name: admin
            role: group-admin
          # regular members: <ns>_kim MinIO user, member Nomad policy
          - name: kim
            role: group-member
            email: kim@sun.ac.za
          # multi-role: abhi gets <ns>_abhi (default) AND <ns>_abhi-admin (sudo)
          - name: abhi
            role: [group-member, group-admin]
            email: abhinavdsharma@sun.ac.za
        submitAccount:
          description: "nf-nomad Nextflow plugin service account"
        collaborators:
          # External collaborator from UCT — access expires 2026-12-31.
          # MinIO user: su-mbhg-bioinformatics_collab-dave-uct
          # Scope: collab/dave-uct/ r/w + shared/ read-only
          - name: dave-uct
            expiresAt: "2026-12-31"
            email: dave@partner-uct.ac.za
            role: group-collaborator

      - name: hostgen
