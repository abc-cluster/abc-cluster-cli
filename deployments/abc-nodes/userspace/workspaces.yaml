version: v2

# ---------------------------------------------------------------------------
# abc-nodes workspace specification (v2 — per-person credential model)
#
# This file is the single source of truth for workspace lifecycle management.
# Running `pulumi up` applies any diff against live Nomad + RustFS state.
#
# CREDENTIAL MODEL
# ────────────────
#   • Top-level users[] lists every human / service account once.
#   • Each user gets ONE Nomad ACL token + ONE RustFS IAM user, named after
#     their global `name` (not per-namespace).
#   • Per-(workspace, role) IAM groups + Nomad policies are still created;
#     the user joins the relevant groups and her Nomad token carries the
#     union of all attached policies.
#   • `role: group-admin` auto-implies `group-member` (admin's bucket scope
#     is a superset). Declare a single role per (user, workspace).
#   • A user may appear in multiple workspaces — her one token works for all
#     of them. No token swapping needed.
#   • `abc --sudo` is a client-side UX confirmation prompt only. Future
#     short-lived elevation tokens are documented at internal/jurist/types.go.
#
# RESOURCE NAMING
# ───────────────
#   Nomad namespace:        <org>-<workspace>
#   RustFS bucket:          <org>-<workspace>
#   Nomad ACL token name:   <user>                          (e.g. abhi)
#   RustFS IAM user:        <user>                          (e.g. abhi)
#   Nomad policy:           <ns>-{group-admin|member|submit}
#   RustFS IAM policy:      ns-<ns>-group-admin
#                           ns-<ns>-member       (uses ${aws:username})
#                           ns-<ns>-collab-<user>
#                           ns-<ns>-pipeline-submit
#   RustFS IAM group:       g-<ns>-group-admin | g-<ns>-member
#
# BUCKET LAYOUT (per workspace)
# ─────────────────────────────
#   <bucket>/users/<user>/            — user private prefix         (rw)
#   <bucket>/collab/<user>/           — collaborator area           (collab rw)
#   <bucket>/shared/                  — read-only references
#   <bucket>/shared/users/<user>/     — user shared contribution    (rw)
#   <bucket>/samplesheets/            — input samplesheets          (read)
#   <bucket>/pipelines/               — pipeline outputs            (read; submit writes)
#
# CREDENTIAL VARIABLES (Nomad, abc-services namespace)
# ────────────────────────────────────────────────────
#   nomad/jobs/abc-nodes-minio-iam/<user>
#   Fields: access_key, secret_key, scope, buckets[]
#
# STATES
# ──────
#   active     — fully operational (default)
#   suspended  — ACL tokens revoked; data preserved
#   archived   — bucket versioning suspended; read-only intent
#   deleted    — tombstone only; remove entry after `pulumi destroy` confirms
#
# PRIORITY TIERS
# ──────────────
#   high   → job_priority=70  (preempts normal-priority batch jobs)
#   normal → job_priority=50  (default)
#
# COMMON OPERATIONS
# ─────────────────
#   Add a person:           append to users[]; reference from workspace members[]
#   Add member to ws:       append to workspace.members[] with their role
#   Add collaborator:       append to workspace.collaborators[] with expiresAt
#                           and (if Pulumi-managed password) set
#                           collabPassword_<user> via `pulumi config set --secret`
#   Remove a person:        delete from users[]; Pulumi diff destroys their token,
#                           IAM user, and group memberships across all workspaces
#   Remove member from ws:  delete from workspace.members[]; group membership only
#                           is removed (token still exists if user is in other ws)
#   Suspend workspace:      set state: suspended (data preserved, tokens revoked
#                           for users whose ONLY membership is this workspace)
#
# DESTROY GATING
# ──────────────
#   pulumi config set allowDestroy true   # arm
#   pulumi up                              # propagate forceDestroy=true
#   pulumi destroy                         # wipes everything
#
# Without allowDestroy, IAM users + buckets refuse to delete while non-empty.
# ---------------------------------------------------------------------------

# ─── USERS ────────────────────────────────────────────────────────────────
# Every human + service-account principal. Each gets one Nomad token and
# one RustFS IAM user. Add an entry once; reference by `user:` in workspaces.
