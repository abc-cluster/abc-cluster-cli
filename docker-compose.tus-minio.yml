services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin &&
      /usr/bin/mc mb --ignore-existing local/tusd &&
      /usr/bin/mc policy set public local/tusd >/dev/null 2>&1 || true;
      exit 0;
      "

  tusd:
    image: tusproject/tusd:latest
    depends_on:
      - minio
      - minio-init
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
    command:
      - -s3-bucket
      - tusd
      - -s3-endpoint
      - http://minio:9000
      - -s3-disable-ssl
      - -port
      - "8080"
      - -base-path
      - /files/
    ports:
      - "1080:8080"

volumes:
  minio-data:
